# =========================================================
# Application
# =========================================================
quarkus.application.name=react-quarkus-minio
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# =========================================================
# CORS
# =========================================================
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5175,http://panpan.n9ne.cc,http://admin.n9ne.cc,http://api.n9ne.cc}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location
quarkus.http.cors.access-control-max-age=24H

# =========================================================
# PostgreSQL
# =========================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres123}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://119.59.103.227:5432/appdb}

quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:2}
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:10}

# =========================================================
# Hibernate ORM
# =========================================================
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.log.sql=${HIBERNATE_LOG_SQL:false}

# =========================================================
# Flyway
# =========================================================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true

# =========================================================
# MinIO
# =========================================================
minio.endpoint=${MINIO_ENDPOINT:http://119.59.103.227:9000}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:admin123}
minio.bucket=${MINIO_BUCKET:n9ne-media}
minio.public-url=${MINIO_PUBLIC_URL:http://119.59.103.227:9000}

minio.folder.user-portal=user-portal
minio.folder.admin-portal=admin-portal
minio.folder.gallery=user-portal/gallery
minio.folder.hero=user-portal/hero
minio.folder.memories=user-portal/memories
minio.folder.surprise=user-portal/surprise
minio.folder.avatar=admin-portal/avatars
minio.folder.temp=system/temp

# =========================================================
# Proposal Generator
# =========================================================
# Local:
#   PROPOSAL_GENERATOR_URL=http://localhost:9080
#
# Container / Production:
#   PROPOSAL_GENERATOR_URL=http://proposal-generator:9080
#
# This key must match:
#   @RegisterRestClient(configKey = "proposal-generator")
quarkus.rest-client.proposal-generator.url=${PROPOSAL_GENERATOR_URL:http://localhost:9080}

# Public URL returned to frontend.
# Local:
#   http://localhost:8080/api/public/proposals/files
#
# Production:
#   http://api.n9ne.cc/api/public/proposals/files
#   or https://api.n9ne.cc/api/public/proposals/files
proposal.public-base-url=${PROPOSAL_PUBLIC_BASE_URL:http://localhost:8080/api/public/proposals/files}

# Metadata sent from backend to proposal-generator for audit/reference records.
proposal.source-service=${PROPOSAL_SOURCE_SERVICE:backend-application}

# =========================================================
# Auth / JWT
# =========================================================
app.auth.jwt-secret=${JWT_SECRET:change-this-secret-in-production-change-this-secret}
app.auth.access-token-expiration-seconds=${ACCESS_TOKEN_EXPIRES_IN:900}
app.auth.refresh-token-expiration-seconds=${REFRESH_TOKEN_EXPIRES_IN:604800}
app.auth.issuer=${JWT_ISSUER:n9ne-api}

mp.jwt.verify.issuer=${JWT_ISSUER:n9ne-api}
mp.jwt.verify.publickey.algorithm=HS256
smallrye.jwt.verify.secretkey=${JWT_SECRET:change-this-secret-in-production-change-this-secret}

# =========================================================
# Admin Login IP Allowlist
# =========================================================
app.admin-login.ip-allowlist.enabled=${ADMIN_IP_ALLOWLIST_ENABLED:true}

# =========================================================
# Admin Register Setup
# =========================================================
app.admin-register.enabled=${ADMIN_REGISTER_ENABLED:true}
app.admin-register.setup-key=${ADMIN_REGISTER_SETUP_KEY:dev-register-key}

# =========================================================
# Site
# =========================================================
app.site.default-key=${SITE_KEY:panpan}
app.site.default-title=${SITE_TITLE:For My Love}

# =========================================================
# OpenAPI / Swagger UI
# =========================================================
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api/docs
quarkus.smallrye-openapi.path=/api/openapi

# =========================================================
# Health
# =========================================================
quarkus.smallrye-health.root-path=/api/q/health

# =========================================================
# Upload limits
# =========================================================
quarkus.http.limits.max-body-size=${MAX_BODY_SIZE:20M}

# =========================================================
# Auth Permissions
# =========================================================
quarkus.http.auth.permission.memories.paths=/api/admin/memories,/api/admin/memories/*
quarkus.http.auth.permission.memories.policy=permit

# =========================================================
# Logging
# =========================================================
quarkus.log.level=${ROOT_LOG_LEVEL:INFO}
quarkus.log.category."com.api".level=${APP_LOG_LEVEL:DEBUG}

quarkus.log.console.level=${CONSOLE_LOG_LEVEL:INFO}
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{3.}] (%t) %s%e%n

quarkus.log.file.enabled=${LOG_FILE_ENABLED:true}
quarkus.log.file.path=${LOG_FILE_PATH:logs/application.log}
quarkus.log.file.level=${LOG_FILE_LEVEL:INFO}
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{3.}] (%t) %s%e%n

quarkus.log.file.rotation.max-file-size=${LOG_MAX_FILE_SIZE:10M}
quarkus.log.file.rotation.max-backup-index=${LOG_MAX_BACKUP_INDEX:10}
quarkus.log.file.rotation.rotate-on-boot=true
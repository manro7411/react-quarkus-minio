quarkus.http.host=0.0.0.0
quarkus.http.port=9080

# =========================================================
# Database
# =========================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres123}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://119.59.103.227:5432/proposal_db}

# =========================================================
# Hibernate / Flyway
# =========================================================
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# =========================================================
# MinIO internal connection
# ????????? proposal-generator upload/download object ??? MinIO
# =========================================================
minio.endpoint=${MINIO_ENDPOINT:http://119.59.103.227:9000}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:admin123}
minio.bucket=${MINIO_BUCKET:n9ne-media}
minio.proposal-prefix=${MINIO_PROPOSAL_PREFIX:proposals}

# =========================================================
# Public download URL
# ??? proposal-generator ???? internal container ???? ?
# URL ??????????????????? ???? public URL ??? backend ????????
# =========================================================
minio.public-base-url=${MINIO_PUBLIC_BASE_URL:http://proposal-generator:9080/internal/proposals/files}

# =========================================================
# Logging
# =========================================================
quarkus.log.level=${ROOT_LOG_LEVEL:INFO}
quarkus.log.category."com.api".level=${APP_LOG_LEVEL:DEBUG}
quarkus.log.category."com.api.proposal".level=${PROPOSAL_LOG_LEVEL:DEBUG}

# Console log
quarkus.log.console.enable=true
quarkus.log.console.level=${CONSOLE_LOG_LEVEL:INFO}
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{3.}] (%t) %s%e%n

# File log
# Local default: logs/proposal-generator.log
# Container/server override: LOG_FILE_PATH=/app/logs/proposal-generator.log
quarkus.log.file.enable=${LOG_FILE_ENABLED:true}
quarkus.log.file.path=${LOG_FILE_PATH:logs/proposal-generator.log}
quarkus.log.file.level=${LOG_FILE_LEVEL:INFO}
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{3.}] (%t) %s%e%n

# File log rotation
quarkus.log.file.rotation.max-file-size=${LOG_MAX_FILE_SIZE:10M}
quarkus.log.file.rotation.max-backup-index=${LOG_MAX_BACKUP_INDEX:10}
quarkus.log.file.rotation.rotate-on-boot=true
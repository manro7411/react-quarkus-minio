name: CD Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "Containerfile"
      - ".github/workflows/cd-backend.yml"

env:
  BACKEND_IMAGE: ghcr.io/manro7411/react-quarkus-minio-backend
  CONTAINER_NAME: backend-application
  NETWORK_NAME: app-network

jobs:
  build-and-deploy-backend:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build backend image
        run: |
          podman build \
            -t "$BACKEND_IMAGE:${{ github.sha }}" \
            -t "$BACKEND_IMAGE:latest" \
            -f Containerfile .

      - name: Push backend image
        run: |
          podman push "$BACKEND_IMAGE:${{ github.sha }}"
          podman push "$BACKEND_IMAGE:latest"

      - name: Deploy backend to Ubuntu Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            IMAGE="ghcr.io/manro7411/react-quarkus-minio-backend:latest"
            CONTAINER_NAME="backend-application"
            NETWORK_NAME="app-network"

            echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io -u manro7411 --password-stdin

            podman network exists "$NETWORK_NAME" || podman network create "$NETWORK_NAME"

            podman pull "$IMAGE"

            podman stop "$CONTAINER_NAME" || true
            
            podman rm "$CONTAINER_NAME" || true

            podman run -d \
              --name "$CONTAINER_NAME" \
              --network "$NETWORK_NAME" \
              --restart=always \
              -p 0.0.0.0:8080:8080 \
              --env-file /app/react-quarkus-minio/backend/app.env \
              -e PROPOSAL_GENERATOR_URL="http://proposal-generator:9080" \
              -e PROPOSAL_PUBLIC_BASE_URL="${{ vars.PROPOSAL_PUBLIC_BASE_URL }}" \
              -e PROPOSAL_SOURCE_SERVICE="backend-application" \
              -v /app/react-quarkus-minio/logs/backend:/app/logs \
              "$IMAGE"

            podman ps --filter name="$CONTAINER_NAME"
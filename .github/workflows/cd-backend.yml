name: CD Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "Containerfile"
      - ".github/workflows/cd-backend.yml"

env:
  BACKEND_IMAGE: ghcr.io/manro7411/react-quarkus-minio-backend

jobs:
  build-and-deploy-backend:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build backend image
        run: |
          podman build \
            -t $BACKEND_IMAGE:${{ github.sha }} \
            -t $BACKEND_IMAGE:latest \
            -f Containerfile .

      - name: Push backend image
        run: |
          podman push $BACKEND_IMAGE:${{ github.sha }}
          podman push $BACKEND_IMAGE:latest

      - name: Deploy backend to Ubuntu Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io -u manro7411 --password-stdin
            
            podman pull ghcr.io/manro7411/react-quarkus-minio-backend:latest

            podman stop react-quarkus-minio-backend || true
            podman rm react-quarkus-minio-backend || true

            podman run -d \
            --name react-quarkus-minio-backend \
            --restart=always \
            -p 0.0.0.0:8080:8080 \
            --env-file /app/react-quarkus-minio/backend/app.env \
            -v /app/react-quarkus-minio/logs/backend:/app/logs \
            ghcr.io/manro7411/react-quarkus-minio-backend:latest

            podman ps --filter name=react-quarkus-minio-backend
name: CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/manro7411/react-quarkus-minio

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend + Backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image with Podman
        run: |
          podman build \
            -t $IMAGE_NAME:${{ github.sha }} \
            -t $IMAGE_NAME:latest \
            -f Containerfile .

      - name: Push image to GHCR
        run: |
          podman push $IMAGE_NAME:${{ github.sha }}
          podman push $IMAGE_NAME:latest

      - name: Deploy to Ubuntu Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io -u manro7411 --password-stdin

            podman pull ghcr.io/manro7411/react-quarkus-minio:latest

            podman stop react-quarkus-minio || true
            podman rm react-quarkus-minio || true

            podman run -d \
              --name react-quarkus-minio \
              --restart=always \
              -p 8080:8080 \
              -e APP_ENV=prod \
              -e CORS_ORIGINS="*" \
              ghcr.io/manro7411/react-quarkus-minio:latest
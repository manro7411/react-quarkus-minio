name: CD Proposal Generator

on:
  push:
    branches:
      - main
    paths:
      - "proposal-generator/**"
      - "Containerfile.proposal-generator"
      - ".github/workflows/cd-proposal-generator.yml"

env:
  PROPOSAL_GENERATOR_IMAGE: ghcr.io/manro7411/react-quarkus-minio-proposal-generator
  CONTAINER_NAME: proposal-generator
  NETWORK_NAME: app-network

jobs:
  build-and-deploy-proposal-generator:
    name: Build and Deploy Proposal Generator
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build proposal generator image
        run: |
          podman build \
            -t "$PROPOSAL_GENERATOR_IMAGE:${{ github.sha }}" \
            -t "$PROPOSAL_GENERATOR_IMAGE:latest" \
            -f Containerfile.proposal-generator .

      - name: Push proposal generator image
        run: |
          podman push "$PROPOSAL_GENERATOR_IMAGE:${{ github.sha }}"
          podman push "$PROPOSAL_GENERATOR_IMAGE:latest"

      - name: Deploy proposal generator to Ubuntu Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            IMAGE="ghcr.io/manro7411/react-quarkus-minio-proposal-generator:latest"
            CONTAINER_NAME="proposal-generator"
            NETWORK_NAME="app-network"
            LOG_DIR="/app/react-quarkus-minio/logs/proposal-generator"

            echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io -u manro7411 --password-stdin

            podman network exists "$NETWORK_NAME" || podman network create "$NETWORK_NAME"
            mkdir -p "$LOG_DIR"

            podman pull "$IMAGE"

            podman stop "$CONTAINER_NAME" || true
            podman rm "$CONTAINER_NAME" || true

            podman run -d \
              --name "$CONTAINER_NAME" \
              --network "$NETWORK_NAME" \
              --restart=always \
              -e DB_USERNAME="${{ secrets.PROPOSAL_DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.PROPOSAL_DB_PASSWORD }}" \
              -e DB_JDBC_URL="${{ secrets.PROPOSAL_DB_JDBC_URL }}" \
              -e MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}" \
              -e MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY }}" \
              -e MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY }}" \
              -e MINIO_BUCKET="${{ vars.MINIO_BUCKET }}" \
              -e MINIO_PROPOSAL_PREFIX="${{ vars.MINIO_PROPOSAL_PREFIX }}" \
              -e MINIO_PUBLIC_BASE_URL="http://proposal-generator:9080/internal/proposals/files" \
              -e LOG_FILE_ENABLED="true" \
              -e LOG_FILE_PATH="/app/logs/proposal-generator.log" \
              -e LOG_FILE_LEVEL="INFO" \
              -e ROOT_LOG_LEVEL="INFO" \
              -e PROPOSAL_LOG_LEVEL="DEBUG" \
              -v "$LOG_DIR:/app/logs" \
              "$IMAGE"

            podman ps --filter name="$CONTAINER_NAME"
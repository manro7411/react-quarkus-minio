name: CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/ratchanontraitiprat/react-quarkus-minio

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image with Podman
        run: |
          podman build \
            -t $IMAGE_NAME:${{ github.sha }} \
            -t $IMAGE_NAME:latest \
            -f Containerfile .

      - name: Push image to GHCR
        run: |
          podman push $IMAGE_NAME:${{ github.sha }}
          podman push $IMAGE_NAME:latest

      - name: Deploy to Ubuntu Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io -u ratchanontraitiprat --password-stdin

            podman pull ghcr.io/ratchanontraitiprat/react-quarkus-minio:latest

            podman stop react-quarkus-minio || true
            podman rm react-quarkus-minio || true

            podman run -d \
              --name react-quarkus-minio \
              --restart=always \
              -p 8080:8080 \
              -e APP_ENV=prod \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USER="${{ secrets.DB_USER }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}" \
              -e MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}" \
              -e MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY }}" \
              -e MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY }}" \
              -e MINIO_BUCKET="${{ secrets.MINIO_BUCKET }}" \
              -e MINIO_REGION="${{ secrets.MINIO_REGION }}" \
              ghcr.io/ratchanontraitiprat/react-quarkus-minio:latest

            sleep 5
            curl -f http://localhost:8080/api/health

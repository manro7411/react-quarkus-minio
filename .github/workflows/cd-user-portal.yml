name: CD User Portal

on:
  push:
    branches:
      - main
    paths:
      - "user-portal/**"
      - "Containerfile.frontend"
      - ".github/workflows/cd-user-portal.yml"

env:
  FRONTEND_IMAGE: ghcr.io/manro7411/react-quarkus-minio-user-portal
  CONTAINER_NAME: user-portal

jobs:
  build-and-deploy-frontend:
    name: Build and Deploy User Portal
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build frontend image
        run: |
          podman build \
            --build-arg VITE_API_BASE_URL=https://api.n9ne.cc \
            --build-arg VITE_SITE_KEY=panpan \
            -t $FRONTEND_IMAGE:${{ github.sha }} \
            -t $FRONTEND_IMAGE:latest \
            -f Containerfile.frontend .

      - name: Push frontend image
        run: |
          podman push $FRONTEND_IMAGE:${{ github.sha }}
          podman push $FRONTEND_IMAGE:latest

      - name: Deploy frontend to Ubuntu Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            IMAGE="ghcr.io/manro7411/react-quarkus-minio-user-portal:latest"
            CONTAINER_NAME="user-portal"

            echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io -u manro7411 --password-stdin

            podman pull $IMAGE

            podman stop $CONTAINER_NAME || true
            podman rm $CONTAINER_NAME || true

            podman run -d \
              --name $CONTAINER_NAME \
              --restart=always \
              -p 0.0.0.0:5173:5173 \
              $IMAGE

            podman ps --filter name=$CONTAINER_NAME
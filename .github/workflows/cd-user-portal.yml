name: CD Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "Containerfile.frontend"
      - ".github/workflows/cd-user-portal.yml"

env:
  FRONTEND_IMAGE: ghcr.io/manro7411/react-quarkus-minio-frontend

jobs:
  build-and-deploy-frontend:
    name: Build and Deploy Frontend Only
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build frontend image
        run: |
          podman build \
            -t $FRONTEND_IMAGE:${{ github.sha }} \
            -t $FRONTEND_IMAGE:latest \
            -f Containerfile.frontend .

      - name: Push frontend image
        run: |
          podman push $FRONTEND_IMAGE:${{ github.sha }}
          podman push $FRONTEND_IMAGE:latest

      - name: Deploy frontend to Ubuntu Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io -u manro7411 --password-stdin

            podman pull ghcr.io/manro7411/react-quarkus-minio-frontend:latest

            podman stop react-quarkus-minio-frontend || true
            podman rm react-quarkus-minio-frontend || true

            podman run -d \
              --name user-portal \
              --restart=always \
              -p 0.0.0.0:5173:5173 \
              ghcr.io/manro7411/react-quarkus-minio-frontend:latest

            podman ps --filter name=react-quarkus-minio-frontend